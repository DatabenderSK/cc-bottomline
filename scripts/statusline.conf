# ╔══════════════════════════════════════════════════════════╗
# ║  Claude Code Statusline — konfigurácia                  ║
# ╚══════════════════════════════════════════════════════════╝
#
# Témy:
#   default   — 2 riadky, čisté farby
#   minimal   — 1 riadok, len základ
#   nerd      — 2 riadky, emoji ikonky všade
#   compact   — 2 riadky, husté, bez reset časov
#   tokyo     — 3 riadky, Tokyo Night paleta
#
THEME=hybrid

# ── Moduly (1 = zapnutý, 0 = vypnutý) ────────────────────
#
# --- Riadok 1: identifikácia ---
SHOW_MODEL=1              # názov modelu (Opus 4.6, Sonnet, ...)
SHOW_FOLDER=1             # 📁 priečinok projektu
SHOW_BRANCH=1             # git branch
SHOW_GIT_STATUS=0         # git staged/modified počty (+3 ~5)
SHOW_TOOL=1               # aktuálny tool (⚡ Bash, Read, ...)
SHOW_AGENT=0              # sub-agent meno (ak beží)
SHOW_WORKTREE=0           # worktree info (ak je aktívny)
#
# --- Riadok 2: metriky ---
SHOW_CONTEXT=1            # kontext % číslo
SHOW_CONTEXT_BAR=0        # vizuálny progress bar pre kontext (0=len čísla)
SHOW_CONTEXT_TOKENS=1     # tokeny v zátvorkách (234k/1000k)
SHOW_USAGE_5H=1           # 5-hodinový API limit %
SHOW_USAGE_7D=1           # 7-dňový API limit %
SHOW_USAGE_BAR=1          # vizuálny progress bar pre limity ████░░░░
SHOW_USAGE_RESET=1        # čas do resetu (3h 24m)
SHOW_DURATION=0           # trvanie session (7m 3s)
SHOW_LINES_CHANGED=0      # pridané/odobraté riadky (+156 -23)
SHOW_COST=0               # session cost ($X.XX)
SHOW_VERSION=0            # Claude Code verzia

# ── Progress bar ──────────────────────────────────────────
BAR_WIDTH=10              # šírka pre kontext bar (ak zapnutý)
USAGE_BAR_WIDTH=8         # šírka pre usage limit bary

# ── Fetch interval pre usage limity (v sekundách) ────────
# 1800 = 30 min, 3600 = 1 hod, 900 = 15 min
USAGE_FETCH_TTL=1800

# ── Git cache (v sekundách) ───────────────────────────────
GIT_CACHE_TTL=5
